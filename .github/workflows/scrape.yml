name: Scrape NAG Certificates

on:
  schedule:
    # Every day at 08:00 UTC (11:00 Bulgarian time)
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      days_back:
        description: "Number of days to scrape back"
        required: false
        default: "90"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run scraper
        run: node scripts/scrape.mjs ${{ github.event.inputs.days_back || '90' }}

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "data: update registers $(date -u +%Y-%m-%d)"
          git push
