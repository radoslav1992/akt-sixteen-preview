<!doctype html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#7c3aed" />
  <title>Офлайн — Акт 16 Тракер</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Plus Jakarta Sans", system-ui, sans-serif;
      background: #faf8f6;
      color: #1c1917;
      padding: 1.5rem;
    }
    .offline {
      text-align: center;
      max-width: 400px;
    }
    .offline__icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #7c3aed, #f97316);
      color: white;
      font-size: 1.5rem;
      font-weight: 800;
      border-radius: 16px;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 0.75rem;
    }
    p {
      color: #78716c;
      font-size: 0.95rem;
      line-height: 1.65;
      margin-bottom: 1.5rem;
    }
    .btn {
      display: inline-block;
      padding: 0.65rem 1.5rem;
      background: #7c3aed;
      color: white;
      font-size: 0.9rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-family: inherit;
    }
  </style>
</head>
<body>
  <div class="offline">
    <div class="offline__icon">16</div>
    <h1>Няма връзка</h1>
    <p>Изглежда, че сте офлайн. Проверете интернет връзката си и опитайте отново.</p>
    <button class="btn" onclick="location.reload()">Опитай отново</button>
  </div>
</body>
</html>
